name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pillow
        run: python3 -m pip install --user Pillow

      - name: Build avatar module
        run: python3 scripts/build-avatar.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Full package check
        if: matrix.os == 'ubuntu-latest'
        run: npm run check

  verify-ubuntu-check:
    name: ubuntu-latest check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pillow
        run: python3 -m pip install --user Pillow

      - name: Build avatar module
        run: python3 scripts/build-avatar.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full check
        run: npm run check
