name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Pillow in the setup-python environment
        run: python -m pip install --user Pillow==12.1.0

      - name: Build tracked avatar module
        run: npm run build:avatar

      - name: Verify package
        run: npm run check

      - name: Build production bundle
        run: npm run build

      - name: Create release zip
        run: npm run release:bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            manifest.json
            main.js
            styles.css
            release/*.zip
