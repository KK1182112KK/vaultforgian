name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pillow
        run: python3 -m pip install --user Pillow

      - name: Build avatar module
        run: python3 scripts/build-avatar.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run check

      - name: Build production bundle
        run: npm run build

      - name: Create release zip
        run: npm run release:bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            manifest.json
            main.js
            styles.css
            release/*.zip
